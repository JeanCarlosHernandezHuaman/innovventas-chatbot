<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InnovVentas - Asistente Virtual</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 420px; height: 620px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: linear-gradient(135deg, #0078d4, #005a9e); color: white; padding: 20px; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .header-info h2 { font-size: 16px; font-weight: 600; }
    .header-info p { font-size: 12px; opacity: 0.85; }
    .status-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
    .message.bot { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.user { background: #0078d4; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.typing { background: #f0f2f5; align-self: flex-start; }
    .typing-dots span { display: inline-block; width: 8px; height: 8px; background: #999; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .chat-input { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    .chat-input input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 25px; font-size: 14px; outline: none; transition: border 0.2s; }
    .chat-input input:focus { border-color: #0078d4; }
    .chat-input button { width: 46px; height: 46px; background: #0078d4; border: none; border-radius: 50%; cursor: pointer; color: white; font-size: 18px; transition: background 0.2s; }
    .chat-input button:hover { background: #005a9e; }
    .quick-replies { padding: 0 20px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .quick-btn { background: white; border: 1.5px solid #0078d4; color: #0078d4; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .quick-btn:hover { background: #0078d4; color: white; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h2>InnoBot - InnovVentas</h2>
        <p><span class="status-dot"></span>En línea · Asistente Virtual</p>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">¡Hola! 👋 Soy <strong>InnoBot</strong>, el asistente virtual de <strong>InnovVentas</strong>. ¿En qué puedo ayudarte hoy?</div>
    </div>

    <div class="quick-replies">
      <button class="quick-btn" onclick="sendQuick('¿Qué productos tienen disponibles?')">📦 Productos</button>
      <button class="quick-btn" onclick="sendQuick('¿Cuáles son los métodos de pago?')">💳 Pagos</button>
      <button class="quick-btn" onclick="sendQuick('¿Cómo hago seguimiento de mi pedido?')">🚚 Pedidos</button>
      <button class="quick-btn" onclick="sendQuick('¿Cuál es la política de devoluciones?')">↩️ Devoluciones</button>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Escribe tu consulta..." onkeypress="handleKey(event)">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    function sendQuick(text) { document.getElementById('userInput').value = text; sendMessage(); }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text  = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      const typing = addTyping();

      try {
        const res  = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: text}) });
        const data = await res.json();
        typing.remove();
        addMessage(data.response, 'bot');
      } catch {
        typing.remove();
        addMessage('Error al conectar. Intenta de nuevo.', 'bot');
      }
    }

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = text.replace(/\n/g, '<br>');
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 9999;
      return div;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'message typing';
      div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 9999;
      return div;
    }
  </script>
</body>
</html>
